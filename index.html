<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee, #c2e9fb);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            color: #fff;
        }
 
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 25%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 75%; }
            100% { background-position: 0% 50%; }
        }
 
        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2),
                        inset 0 0 30px rgba(255, 255, 255, 0.3);
            padding: 4rem;
            width: 90%;
            max-width: 700px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 10;
            margin-bottom: 2rem;
        }
 
        .glass-container:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: all 0.7s ease;
        }
 
        .glass-container:hover:before {
            animation: shine 1.5s;
        }
 
        @keyframes shine {
            100% { left: 125%; }
        }
 
        .message {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #ff3d7f;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.7);
            opacity: 1;
            transition: opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0;
        }
 
        .hidden {
            opacity: 0;
            position: absolute;
        }
 
        .enter-button {
            margin-top: 2rem;
            background: linear-gradient(45deg, #ff3d7f, #ff758c);
            color: white;
            font-weight: 700;
            padding: 1rem 2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 61, 127, 0.6), 0 0 15px rgba(255, 61, 127, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            font-size: 1.2rem;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
 
        .enter-button:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 25px rgba(255, 61, 127, 0.8);
        }
 
        .enter-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0) 60%);
            transform: rotate(30deg);
            animation: shimmer 3s linear infinite;
        }
 
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
 
        .floating {
            animation: float 6s ease-in-out infinite;
        }
 
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
 
        .heart {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }
 
        .gif-container {
            margin-top: 2rem;
            width: 90%;
            max-width: 500px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 61, 127, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            position: relative;
            z-index: 5;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
 
        .gif-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
        }
 
        .dancing-text {
            display: inline-block;
            animation: textDance 1s ease-in-out infinite;
            animation-delay: calc(var(--char-index) * 0.05s);
        }
 
        @keyframes textDance {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
 
        @media (max-width: 768px) {
            .glass-container { padding: 2rem; }
            .message { font-size: 1.8rem; }
            .gif-container { height: 180px; }
        }
 
        @media (max-width: 480px) {
            .message { font-size: 1.6rem; }
            .glass-container { padding: 1.5rem; }
        }
 
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="life.mp3" type="audio/mpeg"></audio>

    <div id="canvas-container"></div>
 
    <div class="glass-container floating" id="messageContainer">
        <div class="message-container">
            <p class="message" id="initialMessage">Happy Birthday Sophia :3</p>
            <p class="message hidden" id="secondMessage">生日快乐 >.< </p>
        </div>
    </div>
 
    <button class="enter-button" id="enterButton">
        <span>Surprise?</span>
    </button>
 
    <div class="gif-container" id="gifContainer">
        <img src="./gif1.gif" alt="Birthday celebration" class="gif-placeholder">
    </div>
 
    <script>
        function animateText(element) {
            const text = element.textContent;
            element.textContent = '';
            for (let i = 0; i < text.length; i++) {
                const charSpan = document.createElement('span');
                charSpan.textContent = text[i];
                charSpan.className = 'dancing-text';
                charSpan.style.setProperty('--char-index', i);
                element.appendChild(charSpan);
            }
        }
 
        document.addEventListener('DOMContentLoaded', () => {
            const messageContainer = document.getElementById('messageContainer');
            const initialMessage = document.getElementById('initialMessage');
            const secondMessage = document.getElementById('secondMessage');
            const enterButton = document.getElementById('enterButton');
            const gifContainer = document.getElementById('gifContainer');
            const audio = document.getElementById('bgMusic');
 
            messageContainer.addEventListener('click', () => {
                gsap.to(initialMessage, {
                    opacity: 0, y: -30, scale: 0.8, duration: 0.8, ease: "back.out(1.7)",
                    onComplete: () => {
                        initialMessage.classList.add('hidden');
                        secondMessage.classList.remove('hidden');
                        gsap.fromTo(secondMessage,
                            {opacity: 0, y: 30, scale: 0.8},
                            {opacity: 1, y: 0, scale: 1, duration: 0.8, ease: "elastic.out(1, 0.75)"}
                        );
                        gsap.to(enterButton, {opacity: 1, y: 0, duration: 1, delay: 0.3, ease: "back.out(1.7)"});
                        gsap.to(gifContainer, {opacity: 1, y: 0, duration: 1, delay: 0.5, ease: "back.out(1.7)"});
                    }
                });
                createSparkles();
            });
 
            enterButton.addEventListener('mouseenter', () => {
                gsap.to(enterButton, {scale: 1.1, duration: 0.5, repeat: 1, yoyo: true, ease: "elastic.out(1.2, 0.5)"});
            });
 
            function createSparkles() {
                const sparkleEmojis = ['✨', '⭐', '🌟', '🍰', '🎉', '🎊', '🎀'];
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const sparkle = document.createElement('div');
                        sparkle.innerHTML = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
                        sparkle.classList.add('heart');
                        sparkle.style.fontSize = `${Math.random() * 25 + 10}px`;
                        sparkle.style.left = `${Math.random() * window.innerWidth}px`;
                        sparkle.style.top = `${Math.random() * window.innerHeight}px`;
                        document.body.appendChild(sparkle);
                        gsap.to(sparkle, {
                            y: (Math.random() - 0.5) * 200, x: (Math.random() - 0.5) * 200,
                            opacity: 0, rotation: Math.random() * 360, scale: 2,
                            duration: 2 + Math.random() * 2, ease: "power1.out",
                            onComplete: () => sparkle.remove()
                        });
                    }, i * 100);
                }
            }
 
            enterButton.addEventListener('click', () => {
                audio.play();
                window.location.href = "birthday.html";
                gsap.to(gifContainer, {scale: 1.05, duration: 0.4, yoyo: true, repeat: 1, ease: "elastic.out(1, 0.3)"});
                gsap.to('.glass-container', {
                    boxShadow: '0 8px 32px 0 rgba(255,61,127,0.4), inset 0 0 30px rgba(255,255,255,0.5)',
                    borderColor: 'rgba(255,255,255,0.8)', duration: 1, repeat: 2, yoyo: true
                });
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => createSparkles(), i * 300);
                }
            });
 
            gsap.set(enterButton, {opacity: 0, y: 20});
            gsap.set(gifContainer, {opacity: 0, y: 20});
            initParticles();
        });
 
        function initParticles() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);
            const posArray = new Float32Array(600);
            for (let i = 0; i < 600; i++) posArray[i] = (Math.random() - 0.5) * 10;
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const mesh = new THREE.Points(geometry, new THREE.PointsMaterial({size: 0.05, color: 0xffffff, transparent: true, opacity: 0.8}));
            scene.add(mesh);
            (function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.x += 0.0005;
                mesh.rotation.y += 0.0005;
                renderer.render(scene, camera);
            })();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            document.addEventListener('mousemove', (e) => {
                gsap.to(mesh.rotation, {
                    x: -(e.clientY / window.innerHeight) * 2 * 0.2 + 0.2,
                    y: (e.clientX / window.innerWidth) * 2 * 0.2 - 0.2,
                    duration: 2
                });
            });
        }
    </script>
</body>
</html>
